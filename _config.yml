source: source

title: botc-events.uk
description: >-
  Find your nearest Blood on the Clocktower group in the UK. A free, community-maintained
  directory of board game groups with an interactive map.
url: "https://botc-events.uk"
locale: "en_GB"
# With a custom domain (botc-events.uk) the site is served at the root, so baseurl must be "".
# If you remove the custom domain, set baseurl: "/botc-events.uk" so chizmeeple.github.io/botc-events.uk/ works.
baseurl: ""
repository: "chizmeeple/botc-events.uk"
discord_link: "https://discord.gg/PUTkJXwUJY"
og_image: /assets/og.png

goatcounter_domain: botc-events-uk

# Special events markdown filenames start with a date (e.g. 2026-05-02-...).
# Jekyll may treat these like future-dated documents and skip writing them
# unless we explicitly allow `future`.
future: true

collections:
  clubs:
    output: true
    permalink: /clubs/:slug/
  special_events:
    output: true
    permalink: /special/:path/

defaults:
  - scope:
      path: ""
      type: "clubs"
    values:
      layout: "club"
  - scope:
      path: ""
      type: "special_events"
    values:
      layout: "special-event"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-target-blank
  - jekyll-last-modified-at
  - jekyll-relative-links

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CONTRIBUTING.md
  - initial_club_data.md
  - vendor
  - node_modules
  - scripts
