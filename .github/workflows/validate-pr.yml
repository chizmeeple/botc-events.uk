name: Validate PR

on:
  pull_request:
    branches: [main]

jobs:
  validate-clubs:
    name: Validate club data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Validate club frontmatter
        run: ruby script/validate_clubs.rb

  build:
    name: Jekyll build & JSON check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Build site
        run: bundle exec jekyll build

      - name: Validate clubs.json
        run: ruby script/validate_clubs_json.rb
