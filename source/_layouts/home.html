<!doctype html>
<html lang="en-GB">
  <head>
    {% include head.html %}
  </head>
  <body>
    <header class="site-header site-header--home">
      <div class="header-inner">
        <a href="{{ '/' | relative_url }}" class="site-brand">
          <img
            src="{{ '/assets/meeple-map-icon.svg' | relative_url }}"
            alt=""
            class="site-logo"
          />
          <div class="site-brand-text">
            <span class="site-title"
              >botc-events<span class="site-title-tld">.uk</span></span
            >
            <span class="site-tagline"
              >Find your village from groups across the UK</span
            >
          </div>
        </a>
        {% include nav-menu.html %}
      </div>
    </header>
    {% include nav-menu-overlay.html %}
    <main class="page-content">
      <div class="home-layout">
        <div class="map-container">
          <div id="map"></div>
        </div>
        <div class="sidebar" id="sidebar">
          <div class="drawer-handle" id="drawer-handle" aria-expanded="false" aria-label="Expand panel">
            <span class="drawer-chevron" aria-hidden="true">
              <svg class="drawer-chevron-up" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m18 15-6-6-6 6" />
              </svg>
              <svg class="drawer-chevron-down" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </span>
          </div>
          <div class="filter-bar">
            <div class="search-bar">
              <span class="iconify search-icon" data-icon="lucide:search" aria-hidden="true"></span>
              <input
                type="text"
                class="search-input"
                id="search-input"
                placeholder="Search by postcode, group name, or location..."
                autocomplete="off"
              />
              <div class="location-suggestions" id="location-suggestions"></div>
            </div>
            <div class="filter-rows">
              <div class="filter-row">
                <div class="multi-select" id="day-filter">
                  <button
                    class="multi-select-toggle filter-select"
                    type="button"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                  >
                    <span class="multi-select-label">All days</span>
                  </button>
                  <div
                    class="multi-select-dropdown"
                    role="listbox"
                    aria-label="Filter by day"
                  >
                    <label class="multi-select-option" data-day="Monday"
                      ><input type="checkbox" value="Monday" /><span
                        class="multi-select-check"
                      ></span
                      >Monday</label
                    >
                    <label class="multi-select-option" data-day="Tuesday"
                      ><input type="checkbox" value="Tuesday" /><span
                        class="multi-select-check"
                      ></span
                      >Tuesday</label
                    >
                    <label class="multi-select-option" data-day="Wednesday"
                      ><input type="checkbox" value="Wednesday" /><span
                        class="multi-select-check"
                      ></span
                      >Wednesday</label
                    >
                    <label class="multi-select-option" data-day="Thursday"
                      ><input type="checkbox" value="Thursday" /><span
                        class="multi-select-check"
                      ></span
                      >Thursday</label
                    >
                    <label class="multi-select-option" data-day="Friday"
                      ><input type="checkbox" value="Friday" /><span
                        class="multi-select-check"
                      ></span
                      >Friday</label
                    >
                    <label class="multi-select-option" data-day="Saturday"
                      ><input type="checkbox" value="Saturday" /><span
                        class="multi-select-check"
                      ></span
                      >Saturday</label
                    >
                    <label class="multi-select-option" data-day="Sunday"
                      ><input type="checkbox" value="Sunday" /><span
                        class="multi-select-check"
                      ></span
                      >Sunday</label
                    >
                  </div>
                </div>
                <select class="filter-select" id="events-filter">
                  <option value="">All groups</option>
                  <option value="upcoming" selected>With upcoming events</option>
                  <option value="none">No known events</option>
                </select>
              </div>
              <div class="filter-row filter-row--location">
                <select class="filter-select" id="distance-filter" disabled>
                  <option value="">Any distance</option>
                  <option value="5">Within 5 miles</option>
                  <option value="10">Within 10 miles</option>
                  <option value="25">Within 25 miles</option>
                  <option value="50">Within 50 miles</option>
                </select>
                <button class="locate-btn locate-btn--home" id="locate-btn" type="button" aria-pressed="false">
                  <span class="iconify" data-icon="lucide:crosshair" style="width: 14px; height: 14px" aria-hidden="true"></span>
                  <span>Use my location</span>
                </button>
              </div>
            </div>
            <div class="location-pill" id="location-pill" style="display: none">
              <span class="iconify" data-icon="lucide:map-pin" style="width: 12px; height: 12px" aria-hidden="true"></span>
              <span id="location-pill-label"></span>
              <button
                type="button"
                id="location-clear"
                aria-label="Clear location"
              >
                <span class="iconify" data-icon="lucide:x" style="width: 12px; height: 12px" aria-hidden="true"></span>
              </button>
            </div>
          </div>
          <div class="result-count" id="result-count"></div>
          <div class="club-list" id="club-list"></div>

          <noscript>
            <div class="club-list">
              {% for club in site.clubs %} {% include club-card.html club=club
              %} {% endfor %}
            </div>
          </noscript>
        </div>
      </div>
    </main>

    <script>
      window.GameClub = { baseurl: "{{ site.baseurl }}" };
      window.GameClub.applyImgBg = function (img) {
        try {
          var c = document.createElement("canvas");
          c.width = img.naturalWidth;
          c.height = img.naturalHeight;
          var ctx = c.getContext("2d");
          ctx.drawImage(img, 0, 0);
          var d = ctx.getImageData(0, 0, 1, 1).data;
          img.style.backgroundColor =
            "rgb(" + d[0] + "," + d[1] + "," + d[2] + ")";
        } catch (e) {}
      };
    </script>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="{{ '/assets/js/map.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
    <script src="{{ '/assets/js/search.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
    <script src="{{ '/assets/js/location.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
    <script src="{{ '/assets/js/drawer.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
    <script src="{{ '/assets/js/app.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
    {% include iconify-script.html %}
    {% include theme-toggle-script.html %}
    {% include nav-menu-script.html %}
  </body>
</html>
