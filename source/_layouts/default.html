<!DOCTYPE html>
<html lang="en-GB">
<head>
  {% include head.html %}
</head>
<body>
  {% include nav.html %}
  {% include nav-menu-overlay.html %}
  <main class="page-content">
    {{ content }}
  </main>
  {% include footer.html %}
  <div id="share-toast" class="share-toast" aria-live="polite" aria-atomic="true" role="status"></div>
  <script>
    (function () {
      var hideTimer = null;
      window.showShareToast = function (message) {
        var el = document.getElementById("share-toast");
        if (!el) return;
        el.textContent = message;
        el.classList.add("share-toast--visible");
        if (hideTimer) clearTimeout(hideTimer);
        hideTimer = setTimeout(function () {
          el.classList.remove("share-toast--visible");
          hideTimer = null;
        }, 2500);
      };
    })();
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://code.iconify.design/1/1.0.6/iconify.min.js"></script>
  <script>lucide.createIcons();</script>
  <script>
    (function () {
      document.addEventListener("click", function (e) {
        var wrap = e.target.closest(".venue-info-pill-wrap");
        if (wrap) {
          if (e.target.closest(".venue-info-pill-popup")) return;
          e.preventDefault();
          var open = wrap.classList.toggle("venue-info-pill-wrap--open");
          wrap.setAttribute("aria-expanded", open);
        } else {
          document.querySelectorAll(".venue-info-pill-wrap--open").forEach(function (w) {
            w.classList.remove("venue-info-pill-wrap--open");
            w.setAttribute("aria-expanded", "false");
          });
        }
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          document.querySelectorAll(".venue-info-pill-wrap--open").forEach(function (w) {
            w.classList.remove("venue-info-pill-wrap--open");
            w.setAttribute("aria-expanded", "false");
          });
          return;
        }
        var wrap = e.target.closest(".venue-info-pill-wrap");
        if (wrap && (e.key === "Enter" || e.key === " ")) {
          e.preventDefault();
          var open = wrap.classList.toggle("venue-info-pill-wrap--open");
          wrap.setAttribute("aria-expanded", open);
        }
      });
    })();
  </script>
  {% include theme-toggle-script.html %}
  {% include nav-menu-script.html %}
  {% if site.goatcounter_domain and site.goatcounter_domain != "" %}
  <script data-goatcounter="https://{{ site.goatcounter_domain }}.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  {% endif %}
</body>
</html>
